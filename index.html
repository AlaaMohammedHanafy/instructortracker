<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instructor Performance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F5F6F9;
    --panel: #FFFFFF;
    --ink: #1F2937;
    --blue: #3B5BDB;
    --blue-deep: #2A45B0;
    --blue-soft: #EEF1FE;
    --line: #E5E7EB;
    --muted: #6B7280;
    --good: #16A34A;
    --good-bg: #DCFCE7;
    --mid: #D97706;
    --mid-bg: #FEF3C7;
    --low: #DC2626;
    --low-bg: #FEE2E2;
    --good2: #0EA5A5;
    --good2-bg: #E0F7F7;
    --star: #F5A623;
    --tag-bg: #FEF3C7;
    --tag-ink: #8A5B12;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', -apple-system, sans-serif;
    min-height:100vh;
    font-size:14px;
  }
  .wrap{
    max-width:1000px;
    margin:0 auto;
    padding:24px 20px 60px;
  }
  header.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 20px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  header.top .brand-row{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand-logo{
    display:flex;
    align-items:center;
    flex-shrink:0;
  }
  .brand-logo .brand-img{
    height:34px;
    width:auto;
    display:block;
    border-radius:6px;
  }
  .brand-fallback{
    height:34px;
    padding:0 12px;
    display:none;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg, var(--blue), var(--blue-deep));
    color:#fff;
    font-weight:800;
    font-size:13px;
    letter-spacing:.04em;
    border-radius:8px;
  }
  .brand-divider{
    width:1px;
    align-self:stretch;
    background:var(--line);
    margin:2px 0;
  }
  header.top .title-block{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  header.top h1{
    margin:0;
    font-size:18px;
    font-weight:700;
    color:var(--ink);
  }
  header.top .sub{
    color:var(--muted);
    font-size:12.5px;
  }
  .mode-switch{
    display:flex;
    gap:4px;
  }
  .mode-switch button{
    border:none;
    background:transparent;
    padding:8px 16px;
    border-radius:8px;
    font-family:'Inter';
    font-size:13.5px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    transition:.15s;
    position:relative;
  }
  .mode-switch button.active{
    color:var(--blue);
    background:var(--blue-soft);
  }
  .whoami{
    font-size:12px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .whoami .dot{
    width:7px;height:7px;border-radius:50%;background:var(--good);display:inline-block;
  }
  .whoami button{
    border:none;background:none;color:var(--blue);cursor:pointer;font-size:12px;font-weight:600;padding:0;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    margin-bottom:16px;
  }
  .panel h2{
    font-size:14.5px;
    color:var(--ink);
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:700;
  }
  .panel h2 .eyebrow{
    font-size:10.5px;
    background:var(--blue-soft);
    color:var(--blue-deep);
    padding:3px 9px;
    border-radius:999px;
    font-weight:700;
    letter-spacing:.02em;
    text-transform:uppercase;
  }
  label{
    font-size:12px;
    color:var(--muted);
    display:block;
    margin-bottom:5px;
    font-weight:600;
  }
  input[type=text], input[type=date], input[type=password], textarea, select{
    width:100%;
    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 12px;
    font-family:'Inter';
    font-size:13.5px;
    background:#FAFAFB;
    color:var(--ink);
  }
  textarea{resize:vertical;min-height:76px;}
  input:focus, textarea:focus, select:focus{
    outline:2px solid var(--blue);
    outline-offset:1px;
    background:#fff;
  }
  .row{display:flex; gap:12px; flex-wrap:wrap;}
  .row > *{flex:1; min-width:150px;}
  .btn{
    border:none;
    border-radius:8px;
    padding:9px 16px;
    font-family:'Inter';
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
    transition:.15s;
  }
  .btn-primary{background:var(--blue); color:#fff;}
  .btn-primary:hover{background:var(--blue-deep);}
  .btn-ghost{background:#fff; color:var(--blue); border:1px solid var(--line);}
  .btn-ghost:hover{background:var(--blue-soft);}
  .btn-danger{background:transparent; color:var(--low); border:1px solid var(--low-bg); padding:4px 10px; font-size:11.5px;}
  .roster{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:10px;
  }
  .roster-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border:1px solid var(--line);
    background:#FAFAFB;
    border-radius:8px;
    padding:9px 14px;
    cursor:pointer;
    transition:.12s;
  }
  .roster-row:hover{ background:var(--blue-soft); }
  .roster-row.selected{ background:var(--blue-soft); border-color:var(--blue); }
  .roster-row .left{ display:flex; align-items:center; gap:10px; }
  .avatar{
    width:30px; height:30px; border-radius:50%;
    background:linear-gradient(135deg, var(--blue), var(--blue-deep));
    color:#fff; font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .roster-row .name{ font-weight:600; font-size:13.5px; }
  .roster-row .chevron{ color:var(--muted); font-size:11px; }
  .roster-row .count-pill{
    font-size:11px; color:var(--muted); background:#fff;
    border:1px solid var(--line); padding:2px 9px; border-radius:999px;
    white-space:nowrap;
  }
  .stars{ display:inline-flex; gap:2px; }
  .stars .star{ font-size:20px; color:var(--line); line-height:1; }
  .stars .star.filled{ color:var(--star); }
  .stars.input .star{ cursor:pointer; }
  .stars.small .star{ font-size:14px; }
  .tags{ display:flex; flex-wrap:wrap; gap:5px; margin:7px 0; }
  .tags .tag{
    font-size:11px; background:var(--tag-bg); color:var(--tag-ink);
    padding:2px 9px; border-radius:999px; font-weight:600;
  }
  select[multiple]{ min-height:104px; }
  .file-drop{
    border:1.5px dashed var(--line);
    border-radius:10px;
    padding:20px;
    text-align:center;
    background:#FAFAFB;
    color:var(--muted);
    font-size:13px;
    cursor:pointer;
    transition:.12s;
  }
  .file-drop:hover, .file-drop.dragover{ border-color:var(--blue); color:var(--blue); background:var(--blue-soft); }
  .file-drop input{ display:none; }
  .file-name{ font-size:12px; color:var(--blue-deep); margin-top:8px; font-weight:600; }
  .chip{
    border:1px solid var(--line);
    background:#FAFAFB;
    padding:6px 13px;
    border-radius:999px;
    font-size:12.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .chip.selected{
    background:var(--blue);
    color:#fff;
    border-color:var(--blue);
  }
  .chip .nid{
    font-family:'SFMono-Regular',Consolas,monospace;
    font-size:10.5px;
    opacity:.7;
  }
  .empty{
    color:var(--muted);
    font-size:13px;
    padding:14px 0;
    text-align:center;
  }
  .ticket{
    position:relative;
    display:flex;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
    margin-bottom:10px;
    background:#FCFCFD;
  }
  .ticket .stub{
    width:5px;
    flex-shrink:0;
  }
  .ticket .stub.perf-excellent{background:var(--good);}
  .ticket .stub.perf-good{background:var(--good2);}
  .ticket .stub.perf-mid{background:var(--mid);}
  .ticket .stub.perf-low{background:var(--low);}
  .ticket .body{
    padding:11px 15px;
    flex:1;
  }
  .ticket .meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11.5px;
    color:var(--muted);
    border-bottom:1px dashed var(--line);
    padding-bottom:7px;
    margin-bottom:7px;
    flex-wrap:wrap;
    gap:6px;
  }
  .ticket .meta .badge{
    font-weight:700;
    font-size:11px;
    padding:2px 9px;
    border-radius:999px;
  }
  .badge.perf-excellent{background:var(--good-bg); color:var(--good);}
  .badge.perf-good{background:var(--good2-bg); color:var(--good2);}
  .badge.perf-mid{background:var(--mid-bg); color:var(--mid);}
  .badge.perf-low{background:var(--low-bg); color:var(--low);}
  .ticket .comment{
    font-size:13.5px;
    line-height:1.6;
  }
  .ticket .added-by{
    font-size:11px;
    color:var(--muted);
    margin-top:6px;
  }
  .ticket .row-actions{
    margin-top:8px;
    text-align:right;
  }
  table.summary{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
  }
  table.summary th, table.summary td{
    padding:9px 10px;
    border-bottom:1px solid var(--line);
    text-align:left;
  }
  table.summary th{
    color:var(--muted);
    font-weight:700;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.02em;
  }
  .status-pill{
    display:inline-block;
    background:var(--good-bg);
    color:var(--good);
    font-size:11px;
    font-weight:700;
    padding:2px 10px;
    border-radius:999px;
  }
  .pin-overlay{
    position:fixed;
    inset:0;
    background:rgba(31,41,55,.5);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  .pin-box{
    background:#fff;
    border-radius:12px;
    padding:26px;
    width:300px;
  }
  .pin-box h3{margin:0 0 4px; color:var(--ink); font-size:16px;}
  .pin-box .sub{color:var(--muted); font-size:12px; margin-bottom:16px;}
  .pin-err{color:var(--low); font-size:12px; min-height:16px; margin-bottom:4px;}
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:#fff;
    padding:9px 18px;
    border-radius:999px;
    font-size:12.5px;
    z-index:60;
    opacity:0;
    transition:opacity .25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
  .search-bar{display:flex; gap:8px;}
  .search-bar input{flex:1;}
  .instructor-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--blue-soft);
    color:var(--blue-deep);
    padding:14px 18px;
    border-radius:10px;
    margin-bottom:16px;
  }
  .instructor-card .name{font-weight:700; font-size:16px;}
  .instructor-card .nid{font-family:'SFMono-Regular',Consolas,monospace; font-size:11.5px; opacity:.75;}
  .loading{color:var(--muted); font-size:13px; text-align:center; padding:20px;}
  .admin-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:14px;
  }
  .admin-chip{
    border:1px solid var(--line);
    background:#FAFAFB;
    padding:5px 12px;
    border-radius:999px;
    font-size:12px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  @media (max-width:600px){
    header.top{flex-direction:column; align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Loading data...</div>
</div>

<div class="toast" id="toast"></div>

<!-- استيراد ملف بيانات تيم ألاء بشكل خارجي -->
<script src="alaa_team.js"></script>

<script>
const PERF_LEVELS = [
  {key:'excellent', label:'Excellent'},
  {key:'good', label:'Very good'},
  {key:'mid', label:'Average'},
  {key:'low', label:'Needs improvement'},
];
const PERF_SCORE = {excellent:4, good:3, mid:2, low:1};
const IMPROVEMENT_AREAS = ['Camera', 'Attitude', 'Preparation', 'Patient with student', 'Body language'];

// A note's overall rating is 1-5 stars. Older notes only have a `performance`
// level (excellent/good/mid/low) — noteScore() converts either shape to a
// single 1-5 number so averages and colors work the same for both.
function noteScore(n){
  if(typeof n.overall === 'number' && n.overall > 0) return n.overall;
  if(n.performance && PERF_SCORE[n.performance]) return PERF_SCORE[n.performance] * 1.25;
  return 0;
}
function perfTierFromScore(score){
  if(score >= 4.5) return 'excellent';
  if(score >= 3.5) return 'good';
  if(score >= 2.5) return 'mid';
  return 'low';
}
function initials(name){
  const parts = String(name||'').trim().split(/\s+/).filter(Boolean);
  if(parts.length === 0) return '?';
  if(parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}
function renderStarsStatic(score, small){
  const rounded = Math.round(score);
  let html = `<span class="stars ${small?'small':''}">`;
  for(let i=1;i<=5;i++){ html += `<span class="star ${i<=rounded?'filled':''}">★</span>`; }
  html += `</span>`;
  return html;
}
function renderStarsInput(current){
  let html = `<span class="stars input" id="overallStars">`;
  for(let i=1;i<=5;i++){ html += `<span class="star ${i<=current?'filled':''}" data-val="${i}">★</span>`; }
  html += `</span>`;
  return html;
}
function freshDraft(){
  return { date: new Date().toISOString().slice(0,10), session: '', overall: 0, improvements: [], comment: '' };
}

// جلب التيم الخارجي عند توفره، وإلا استخدام مصفوفة فارغة للاستيراد اليدوي
const DEFAULT_TEAM = typeof ALAA_TEAM_DATA !== 'undefined' ? ALAA_TEAM_DATA : [];

const DEFAULT_TEAMS = [
  { id:'t1', label:'Team 1 - Alaa',      username:'alaa',  password:'alaa1234',  isAdmin:true },
  { id:'t2', label:'Team 2 - Sara Adly', username:'sara',  password:'sara1234' },
  { id:'t3', label:'Team 3 - Marwa',     username:'marwa', password:'marwa1234'},
  { id:'t4', label:'Team 4 - Yomna',     username:'yomna', password:'yomna1234'},
];

const DEFAULT_LEADER = { username:'leader', password:'leader2026' };

function getRoleFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const role = params.get('role');
  if(role === 'user' || role === 'lead' || role === 'admin' || role === 'leader') return role;
  return null;
}

let state = {
  mode: 'instructor',
  adminUnlocked: false,
  leaderUnlocked: false,
  leaderTeamFilter: 'all',
  currentTeamId: null,
  currentTeamLabel: null,
  data: null,
  selectedInstructorId: null,
  lookupResultId: null,
  lookupInput: '',
  loading: true,
  roleParam: getRoleFromUrl(),
  noteDraft: null,
  importFileName: null,
};

// ====================== BACKEND CONFIG ======================
// This app works two ways automatically:
//  1) Inside a Claude.ai artifact — uses the built-in window.storage API.
//  2) Hosted anywhere else (your own domain/server) — fill in a free
//     Supabase project's URL + anon key below and it talks to that instead.
const SUPABASE_URL = ''; // e.g. 'https://xxxxxxxx.supabase.co'
const SUPABASE_ANON_KEY = ''; // the "anon public" key from Project Settings > API
const SUPABASE_TABLE = 'dashboard_data';
// ==============================================================

const DATA_KEY = 'team_data';

function defaultData(){
  return { instructors: [], notes: {}, teams: DEFAULT_TEAMS.map(t=>({...t})) };
}

function supabaseHeaders(extra){
  return Object.assign({
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
  }, extra || {});
}

async function loadData(){
  try{
    if(window.storage){
      const res = await window.storage.get(DATA_KEY, true);
      state.data = res ? JSON.parse(res.value) : defaultData();
    } else if(SUPABASE_URL && SUPABASE_ANON_KEY){
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?key=eq.${DATA_KEY}&select=value`,
        { headers: supabaseHeaders() }
      );
      const rows = await res.json();
      state.data = (Array.isArray(rows) && rows[0]) ? rows[0].value : defaultData();
    } else {
      showToast('لسه محطوطش بيانات Supabase — راجع الكود');
      state.data = defaultData();
    }
  }catch(e){
    state.data = defaultData();
  }
  if(!state.data.teams || state.data.teams.length === 0){
    state.data.teams = DEFAULT_TEAMS.map(t=>({...t}));
  }
  // Older saved data won't have the isAdmin flag yet — grant it to Team 1
  // (or the first team) so the share-links panel has exactly one owner.
  if(!state.data.teams.some(t=>t.isAdmin)){
    const adminTeam = state.data.teams.find(t=>t.id==='t1') || state.data.teams[0];
    if(adminTeam) adminTeam.isAdmin = true;
  }
  if(!state.data.leaderAccount){
    state.data.leaderAccount = {...DEFAULT_LEADER};
  }
  state.data.instructors.forEach(i=>{
    if(!i.teamId && i.team){
      const match = state.data.teams.find(t=> t.label.toLowerCase().includes(String(i.team).toLowerCase()) || String(i.team).toLowerCase().includes(t.label.toLowerCase()));
      i.teamId = match ? match.id : state.data.teams[0].id;
    } else if(!i.teamId){
      i.teamId = state.data.teams[0].id;
    }
  });

  if(state.roleParam === 'user'){
    state.mode = 'instructor';
  } else if(state.roleParam === 'lead' || state.roleParam === 'admin'){
    state.mode = 'admin';
  } else if(state.roleParam === 'leader'){
    state.mode = 'leader';
  }
  state.loading = false;
  render();
}

async function saveData(){
  try{
    if(window.storage){
      const res = await window.storage.set(DATA_KEY, JSON.stringify(state.data), true);
      if(!res){ showToast('Could not save — please try again'); }
      return;
    }
    if(SUPABASE_URL && SUPABASE_ANON_KEY){
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?on_conflict=key`,
        {
          method: 'POST',
          headers: supabaseHeaders({
            'Content-Type': 'application/json',
            Prefer: 'resolution=merge-duplicates,return=minimal',
          }),
          body: JSON.stringify([{ key: DATA_KEY, value: state.data }]),
        }
      );
      if(!res.ok){ showToast('Could not save — please try again'); }
      return;
    }
    showToast('لسه محطوطش بيانات Supabase — راجع الكود');
  }catch(e){
    showToast('Could not save — please try again');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function teamLabelFor(teamId){
  const t = (state.data.teams||[]).find(t=>t.id===teamId);
  return t ? t.label : '';
}

function perfLabel(key){
  const p = PERF_LEVELS.find(p=>p.key===key);
  return p ? p.label : key;
}

function render(){
  const app = document.getElementById('app');
  if(state.loading){
    app.innerHTML = '<div class="loading">Loading data...</div>';
    return;
  }
  app.innerHTML = `
    ${renderHeader()}
    ${state.mode === 'admin' ? renderAdmin() : state.mode === 'leader' ? renderLeaderMode() : renderInstructor()}
    ${(!state.adminUnlocked && state.mode==='admin') ? renderPinOverlay() : ''}
    ${(!state.leaderUnlocked && state.mode==='leader') ? renderLeaderPinOverlay() : ''}
  `;
  attachHeaderEvents();
  if(state.mode === 'admin' && state.adminUnlocked) attachAdminEvents();
  if(state.mode === 'instructor') attachInstructorEvents();
  if(state.mode === 'admin' && !state.adminUnlocked) attachPinEvents();
  if(state.mode === 'leader' && state.leaderUnlocked) attachLeaderEvents();
  if(state.mode === 'leader' && !state.leaderUnlocked) attachLeaderPinEvents();
}

function renderHeader(){
  return `
  <header class="top">

function attachHeaderEvents(){
  document.querySelectorAll('.mode-switch button').forEach(btn=>{
    btn.onclick = ()=>{
      state.mode = btn.dataset.mode;
      render();
    };
  });
  const signOut = document.getElementById('signOutBtn');
  if(signOut) signOut.onclick = ()=>{
    state.adminUnlocked = false;
    state.currentTeamId = null;
    state.currentTeamLabel = null;
    state.selectedInstructorId = null;
    render();
  };
  const leaderSignOut = document.getElementById('leaderSignOutBtn');
  if(leaderSignOut) leaderSignOut.onclick = ()=>{
    state.leaderUnlocked = false;
    state.selectedInstructorId = null;
    render();
  };
}

function renderPinOverlay(){
  return `
  <div class="pin-overlay">
    <div class="pin-box">
      <h3>${state.roleParam === 'lead' ? 'Team leader sign-in' : 'Team sign-in'}</h3>
      <div class="sub">${state.roleParam === 'lead' ? "Sign in with your team's username and password to view your read-only performance summary" : "Enter your team's username and password"}</div>
      <label>Username</label>
      <input type="text" id="teamUserInput" placeholder="Username" autocomplete="username" />
      <div style="height:10px"></div>
      <label>Password</label>
      <input type="password" id="pinInput" placeholder="Password" autocomplete="current-password" />
      <div class="pin-err" id="pinErr"></div>
      <button class="btn btn-primary" id="pinSubmit" style="width:100%; margin-top:6px">Sign in</button>
    </div>
  </div>`;
}

function attachPinEvents(){
  const submit = ()=>{
    const username = document.getElementById('teamUserInput').value.trim().toLowerCase();
    const pin = document.getElementById('pinInput').value;
    const match = state.data.teams.find(t=> t.username.toLowerCase() === username && t.password === pin);
    if(match){
      state.adminUnlocked = true;
      state.currentTeamId = match.id;
      state.currentTeamLabel = match.label;
      render();
    }else{
      document.getElementById('pinErr').textContent = 'Wrong username or password';
    }
  };
  document.getElementById('pinSubmit').onclick = submit;
  document.getElementById('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  document.getElementById('teamUserInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  document.getElementById('teamUserInput').focus();
}

function renderLeaderPinOverlay(){
  return `
  <div class="pin-overlay">
    <div class="pin-box">
      <h3>Leader sign-in</h3>
      <div class="sub">Sign in to view every team's instructors, notes and performance together</div>
      <label>Username</label>
      <input type="text" id="leaderUserInput" placeholder="Username" autocomplete="username" />
      <div style="height:10px"></div>
      <label>Password</label>
      <input type="password" id="leaderPinInput" placeholder="Password" autocomplete="current-password" />
      <div class="pin-err" id="leaderPinErr"></div>
      <button class="btn btn-primary" id="leaderPinSubmit" style="width:100%; margin-top:6px">Sign in</button>
    </div>
  </div>`;
}

function attachLeaderPinEvents(){
  const submit = ()=>{
    const username = document.getElementById('leaderUserInput').value.trim().toLowerCase();
    const pin = document.getElementById('leaderPinInput').value;
    const acc = state.data.leaderAccount || DEFAULT_LEADER;
    if(acc.username.toLowerCase() === username && acc.password === pin){
      state.leaderUnlocked = true;
      render();
    }else{
      document.getElementById('leaderPinErr').textContent = 'Wrong username or password';
    }
  };
  document.getElementById('leaderPinSubmit').onclick = submit;
  document.getElementById('leaderPinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  document.getElementById('leaderUserInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  document.getElementById('leaderUserInput').focus();
}

function renderAdmin(){
  if(!state.adminUnlocked) return '<div style="min-height:200px"></div>';
  if(state.roleParam === 'lead') return renderLeadView();

  const team = state.data.teams.find(t=>t.id === state.currentTeamId);
  const instructors = state.data.instructors.filter(i=> i.teamId === state.currentTeamId);
  const selected = instructors.find(i=>i.id === state.selectedInstructorId) || null;
  const showDefaultImport = state.currentTeamId === 't1';

  return `
  ${team && team.isAdmin ? renderShareLinksPanel() : ''}
  <div class="panel">
    <h2><span class="eyebrow">Account</span> My team</h2>
    <div class="admin-list">
      <span class="admin-chip">👤 ${escapeHtml(team ? team.label : '')} · user: ${escapeHtml(team ? team.username : '')}</span>
    </div>
    <div class="row">
      <div>
        <label>New username</label>
        <input type="text" id="accUsername" placeholder="Leave as-is to keep current" value="${escapeHtml(team ? team.username : '')}">
      </div>
      <div>
        <label>New password</label>
        <input type="password" id="accPassword" placeholder="Leave blank to keep current">
      </div>
      <div style="flex:0 0 auto; align-self:flex-end">
        <button class="btn btn-ghost" id="updateAccountBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2><span class="eyebrow">Import</span> Add instructors</h2>
    ${showDefaultImport ? `
    <div style="background:var(--blue-soft); border-radius:8px; padding:12px 14px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
      <div style="font-size:12.5px; color:var(--blue-deep)">One click: import your saved team list (${DEFAULT_TEAM.length} instructors)</div>
      <button class="btn btn-primary" id="importDefaultBtn" style="flex:0 0 auto">Import my team</button>
    </div>` : ''}
    <label>Upload a CSV file (header row Tutor ID, Name, Phone, NID, Grade — or simply Name, National ID per line). Always added to your own team only.</label>
    <div class="file-drop" id="fileDrop">
      📄 Click to choose a CSV file, or drag it here
      <input type="file" id="importFileInput" accept=".csv,text/csv">
      ${state.importFileName ? `<div class="file-name">${escapeHtml(state.importFileName)}</div>` : ''}
    </div>
    <div style="height:16px"></div>
    <label>...or paste a CSV (same format). Rows are always added to your own team only.</label>
    <textarea id="importBox" placeholder="Example:&#10;Tutor ID,Name,Phone,NID,Grade&#10;T-13932,Yara Mostafa,1207717867,30111198800504,G4"></textarea>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-primary" id="importBtn" style="flex:0 0 auto">Import pasted rows</button>
      <button class="btn btn-ghost" id="exportBtn" style="flex:0 0 auto">Export my team's data (CSV)</button>
    </div>
  </div>

  <div class="panel">
    <h2>Instructor roster (${instructors.length})</h2>
    <div class="search-bar">
      <input type="text" id="rosterFilter" placeholder="Search by name or national ID...">
    </div>
    ${renderRosterList(instructors, { emptyText: 'No instructors yet — import them above' })}
  </div>

  ${selected ? renderSelectedInstructorAdmin(selected) : ''}

  <div class="panel">
    <h2>Team summary</h2>
    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;margin-bottom:8px;">Most common areas to improve</div>
    ${renderImprovementChart(instructors)}
    <div style="margin-top:16px;">${renderTeamSummary(instructors)}</div>
  </div>
  `;
}

function renderSelectedInstructorAdmin(selected){
  const list = (state.data.notes[selected.id] || []).slice().sort((a,b)=> b.date.localeCompare(a.date));
  if(!state.noteDraft) state.noteDraft = freshDraft();
  const d = state.noteDraft;
  return `
  <div class="panel">
    <div class="instructor-card">

function computeImprovementCounts(instructors){
  const counts = {};
  IMPROVEMENT_AREAS.forEach(a=> counts[a] = 0);
  instructors.forEach(i=>{
    (state.data.notes[i.id] || []).forEach(n=>{
      (n.improvements || []).forEach(a=>{ counts[a] = (counts[a] || 0) + 1; });
    });
  });
  return counts;
}

function renderImprovementChart(instructors){
  const counts = computeImprovementCounts(instructors);
  const entries = Object.entries(counts).sort((a,b)=> b[1]-a[1]);
  const total = entries.reduce((s,e)=> s+e[1], 0);
  if(total === 0){
    return '<div class="empty" style="padding:6px 0;">No "needs to improve" tags recorded yet</div>';
  }
  const max = Math.max(1, ...entries.map(e=>e[1]));
  return `
  <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:2px;">
    ${entries.map(([area,count])=>{
      const pct = Math.round((count/max)*100);
      return `
      <div>
        <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:3px;">
          <span style="font-weight:600; color:var(--ink);">${escapeHtml(area)}</span>
          <span style="color:var(--muted);">${count}</span>
        </div>
        <div style="background:var(--line); border-radius:6px; height:9px; overflow:hidden;">
          <div style="background:var(--blue); width:${pct}%; height:100%; border-radius:6px;"></div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderTeamSummary(instructors){
  const { notes } = state.data;
  if(instructors.length === 0) return '<div class="empty">Import the team first to see the numbers</div>';
  let rows = instructors.map(i=>{
    const list = notes[i.id] || [];
    const scores = list.map(noteScore);
    const avg = scores.length ? scores.reduce((a,b)=>a+b,0) / scores.length : 0;
    const last = list.length ? list.slice().sort((a,b)=> b.date.localeCompare(a.date))[0].date : '—';
    return { name:i.name, id:i.id, grade:i.grade||'', count:list.length, avg, last };
  });
  rows = rows.sort((a,b)=>{
    if(a.count === 0 && b.count === 0) return 0;
    if(a.count === 0) return 1;
    if(b.count === 0) return -1;
    return a.avg - b.avg;
  });
  return `
  <table class="summary">
    <thead><tr>
      <th>Name</th><th>Grade</th><th>Notes</th><th>Avg. rating</th><th>Last note</th>
    </tr></thead>
    <tbody>
      ${rows.map(r=>`
        <tr>
          <td>${escapeHtml(r.name)}</td>
          <td>${escapeHtml(r.grade)}</td>
          <td>${r.count}</td>
          <td>${r.count ? renderStarsStatic(r.avg, true) : '—'}</td>
          <td>${r.last}</td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

function splitCsvLine(line){
  const result = [];
  let cur = '', inQ = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c === '"'){
      if(inQ && line[i+1] === '"'){ cur += '"'; i++; }
      else inQ = !inQ;
    } else if(c === ',' && !inQ){
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result.map(s=>s.trim());
}

function parseImportText(text){
  const lines = text.split('\n').map(l=>l.replace(/\r$/,'')).filter(l=>l.trim().length>0);
  if(lines.length === 0) return [];
  const rows = lines.map(splitCsvLine);
  const firstLower = rows[0].map(c=>c.toLowerCase());
  const looksLikeHeader = firstLower.some(c=>c.includes('name')) && firstLower.some(c=>c.includes('id'));

  let colMap = null, startIdx = 0;
  if(looksLikeHeader){
    colMap = {};
    firstLower.forEach((c, idx)=>{
      if(c.includes('tutor') && c.includes('id')) colMap.tutorId = idx;
      else if(c.includes('nid') || c.includes('national')) colMap.nid = idx;
      else if(c.includes('phone')) colMap.phone = idx;
      else if(c.includes('grade')) colMap.grade = idx;
      else if(c.includes('mentor') || c.includes('team')) colMap.team = idx;
      else if(c.includes('name')) colMap.name = idx;
    });
    startIdx = 1;
  }

  const out = [];
  for(let r = startIdx; r < rows.length; r++){
    const cols = rows[r];
    if(cols.length < 2) continue;
    let rec;
    if(colMap){
      rec = {
        name: colMap.name != null ? cols[colMap.name] : '',
        nid: colMap.nid != null ? cols[colMap.nid] : '',
        tutorId: colMap.tutorId != null ? cols[colMap.tutorId] : '',
        phone: colMap.phone != null ? cols[colMap.phone] : '',
        grade: colMap.grade != null ? cols[colMap.grade] : '',
        team: colMap.team != null ? cols[colMap.team] : '',
      };
    } else {
      rec = { name: cols[0], nid: cols[1], tutorId: cols[2]||'', phone: cols[3]||'', grade: cols[4]||'', team: cols[5]||'' };
    }
    if(rec.name && rec.nid) out.push(rec);
  }
  return out;
}

function addInstructorRecords(records, teamId){
  let added = 0, skipped = 0;
  records.forEach(rec=>{
    const nid = String(rec.nid).trim();
    if(!nid){ skipped++; return; }
    const exists = state.data.instructors.find(i=>i.id === nid);
    if(exists){ skipped++; return; }
    state.data.instructors.push({
      id: nid,
      name: rec.name,
      tutorId: rec.tutorId || '',
      phone: rec.phone || '',
      grade: rec.grade || '',
      teamId: teamId,
    });
    if(!state.data.notes[nid]) state.data.notes[nid] = [];
    added++;
  });
  return { added, skipped };
}

function handleImport(){
  const box = document.getElementById('importBox');
  const records = parseImportText(box.value);
  if(records.length === 0){ showToast('No valid rows found — check the format'); return; }
  const { added, skipped } = addInstructorRecords(records, state.currentTeamId);
  saveData();
  box.value = '';
  render();
  showToast(added > 0 ? `Imported ${added} instructor(s)${skipped?` · ${skipped} already existed`:''}` : 'All those national IDs already exist');
}

function processImportFile(file){
  state.importFileName = file.name;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const text = e.target.result;
    const records = parseImportText(text);
    if(records.length === 0){ showToast('No valid rows found in the file'); render(); return; }
    const { added, skipped } = addInstructorRecords(records, state.currentTeamId);
    saveData();
    render();
    showToast(added > 0 ? `Imported ${added} instructor(s) from file${skipped?` · ${skipped} already existed`:''}` : 'All those national IDs already exist');
  };
  reader.onerror = ()=>{ showToast('Could not read the file'); render(); };
  reader.readAsText(file, 'UTF-8');
}

function handleImportDefaultTeam(){
  if(state.currentTeamId !== 't1') return;
  const records = DEFAULT_TEAM.map(row => ({
    tutorId: row[0], name: row[1], phone: row[2], nid: row[3], grade: row[4],
  }));
  const { added, skipped } = addInstructorRecords(records, 't1');
  saveData();
  render();
  showToast(added > 0 ? `Imported ${added} instructor(s) from your team list${skipped?` · ${skipped} already existed`:''}` : 'Your team is already fully imported');
}

function handleAddNote(){
  const id = state.selectedInstructorId;
  if(!id) return;
  const owner = state.data.instructors.find(i=>i.id === id);
  if(!owner || owner.teamId !== state.currentTeamId) return;
  const d = state.noteDraft || freshDraft();
  const date = document.getElementById('noteDate').value;
  const session = document.getElementById('noteSession').value.trim();
  const comment = document.getElementById('noteComment').value.trim();
  if(!date || !comment || !d.overall){
    showToast('Date, a star rating, and a comment are required');
    return;
  }
  if(!state.data.notes[id]) state.data.notes[id] = [];
  state.data.notes[id].push({
    date, session, comment,
    overall: d.overall,
    improvements: d.improvements || [],
    addedBy: state.currentTeamLabel,
    createdAt: Date.now(),
  });
  saveData();
  state.noteDraft = freshDraft();
  render();
  showToast('Note saved');
}

function handleExport(){
  const { notes } = state.data;
  const instructors = state.data.instructors.filter(i=> i.teamId === state.currentTeamId);
  let csv = '\uFEFF' + ['Name','National ID','Tutor ID','Phone','Grade','Date','Session','Performance','Comment','Added by'].join(',') + '\n';
  instructors.forEach(i=>{
    const list = notes[i.id] || [];
    if(list.length === 0){
      csv += [i.name, i.id, i.tutorId||'', i.phone||'', i.grade||'', '', '', '', '', ''].map(csvEscape).join(',') + '\n';
    }
    list.forEach(n=>{
      csv += [i.name, i.id, i.tutorId||'', i.phone||'', i.grade||'', n.date, n.session||'', perfLabel(n.performance), n.comment, n.addedBy||''].map(csvEscape).join(',') + '\n';
    });
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `team-performance-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function csvEscape(v){
  const s = String(v ?? '');
  if(s.includes(',') || s.includes('"') || s.includes('\n')){
    return '"' + s.replace(/"/g,'""') + '"';
  }
  return s;
}

function renderInstructor(){
  const found = state.lookupResultId && state.lookupResultId !== 'notfound' ? state.data.instructors.find(i=>i.id === state.lookupResultId) : null;
  return `
  <div class="panel">
    <h2>Instructor sign-in</h2>
    <label>Enter your national ID</label>
    <div class="search-bar">
      <input type="text" id="lookupInput" placeholder="National ID" value="${escapeHtml(state.lookupInput)}">
      <button class="btn btn-primary" id="lookupBtn" style="flex:0 0 auto">Search</button>
    </div>
  </div>

  ${state.lookupResultId === 'notfound' ? `
    <div class="panel"><div class="empty">No instructor found with this national ID. Double-check it or contact your team lead</div></div>
  ` : ''}

  ${found ? renderInstructorNotes(found) : ''}
  `;
}

function renderInstructorNotes(found){
  const list = (state.data.notes[found.id] || []).slice().sort((a,b)=> b.date.localeCompare(a.date));
  return `
  <div class="panel">
    <div class="instructor-card">
      <div>
        <div class="name">${escapeHtml(found.name)}</div>
        <div class="nid">${escapeHtml(found.id)}${found.tutorId ? ' · ' + escapeHtml(found.tutorId) : ''}${found.grade ? ' · ' + escapeHtml(found.grade) : ''}${teamLabelFor(found.teamId) ? ' · ' + escapeHtml(teamLabelFor(found.teamId)) : ''}</div>
      </div>
      <div><span class="status-pill">${list.length} notes</span></div>
    </div>
    <h2>Weekly notes and updates</h2>
    ${list.length === 0 ? '<div class="empty">No notes recorded for you yet</div>' :
      list.map(n => renderTicket(n, null, null)).join('')}
  </div>`;
}

function attachInstructorEvents(){
  const btn = document.getElementById('lookupBtn');
  const input = document.getElementById('lookupInput');
  const doLookup = ()=>{
    const val = input.value.trim();
    state.lookupInput = val;
    if(!val){ state.lookupResultId = null; render(); return; }
    const found = state.data.instructors.find(i=>i.id === val);
    state.lookupResultId = found ? found.id : 'notfound';
    render();
  };
  if(btn) btn.onclick = doLookup;
  if(input) input.addEventListener('keydown', e=>{ if(e.key==='Enter') doLookup(); });
}

loadData();
</script>
