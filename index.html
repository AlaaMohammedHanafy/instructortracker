<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instructor Performance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F5F6F9;
    --panel: #FFFFFF;
    --ink: #1F2937;
    --blue: #2E5BFF;
    --blue-deep: #1E42D6;
    --blue-soft: #EEF1FE;
    --brand-orange: #F5A623;
    --line: #E5E7EB;
    --muted: #6B7280;
    --good: #16A34A;
    --good-bg: #DCFCE7;
    --mid: #D97706;
    --mid-bg: #FEF3C7;
    --low: #DC2626;
    --low-bg: #FEE2E2;
    --good2: #0EA5A5;
    --good2-bg: #E0F7F7;
    --star: #F5A623;
    --purple: #7C4DFF;
    --purple-soft: #F1ECFF;
    --amber-panel: #FFF8EC;
    --amber-line: #F0DDB0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter', -apple-system, sans-serif; min-height:100vh; font-size:14px;
  }
  .wrap{ max-width:1000px; margin:0 auto; padding:24px 20px 60px; }
  header.top{
    display:flex; justify-content:space-between; align-items:center; gap:16px;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px 20px; margin-bottom:20px; flex-wrap:wrap;
  }
  header.top .brand-row{ display:flex; align-items:center; gap:14px; }
  .brand-logo{ display:flex; align-items:center; flex-shrink:0; }
  .brand-logo .brand-img{ height:30px; width:auto; display:block; }
  .brand-divider{ width:1px; align-self:stretch; background:var(--line); margin:2px 0; }
  header.top .title-block{ display:flex; flex-direction:column; gap:2px; }
  header.top h1{ margin:0; font-size:18px; font-weight:700; color:var(--ink); }
  header.top .sub{ color:var(--muted); font-size:12.5px; }
  .mode-switch{ display:flex; gap:4px; flex-wrap:wrap; }
  .mode-switch button{
    border:none; background:transparent; padding:8px 14px; border-radius:8px;
    font-family:'Inter'; font-size:13px; font-weight:600; color:var(--muted);
    cursor:pointer; transition:.15s; position:relative;
  }
  .mode-switch button.active{ color:var(--blue); background:var(--blue-soft); }
  .whoami{ font-size:12px; color:var(--muted); display:flex; align-items:center; gap:8px; }
  .whoami .dot{ width:7px;height:7px;border-radius:50%;background:var(--good);display:inline-block; }
  .whoami button{ border:none;background:none;color:var(--blue);cursor:pointer;font-size:12px;font-weight:600;padding:0; }
  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:20px; margin-bottom:16px;
  }
  .panel h2{
    font-size:14.5px; color:var(--ink); margin:0 0 14px; display:flex;
    align-items:center; gap:8px; font-weight:700;
  }
  .panel h2 .eyebrow{
    font-size:10.5px; background:var(--blue-soft); color:var(--blue-deep);
    padding:3px 9px; border-radius:999px; font-weight:700; letter-spacing:.02em; text-transform:uppercase;
  }
  .panel h2 .eyebrow.purple{ background:var(--purple-soft); color:var(--purple); }
  .panel h2 .eyebrow.amber{ background:#FBEFDC; color:#8A5B12; }
  label{ font-size:12px; color:var(--muted); display:block; margin-bottom:5px; font-weight:600; }
  input[type=text], input[type=date], input[type=password], textarea, select{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 12px;
    font-family:'Inter'; font-size:13.5px; background:#FAFAFB; color:var(--ink);
  }
  select[multiple]{ min-height:110px; }
  textarea{resize:vertical;min-height:64px;}
  input:focus, textarea:focus, select:focus{ outline:2px solid var(--blue); outline-offset:1px; background:#fff; }
  .row{display:flex; gap:12px; flex-wrap:wrap;}
  .row > *{flex:1; min-width:150px;}
  .btn{
    border:none; border-radius:8px; padding:9px 16px; font-family:'Inter';
    font-weight:600; font-size:13.5px; cursor:pointer; transition:.15s;
  }
  .btn-primary{background:var(--blue); color:#fff;}
  .btn-primary:hover{background:var(--blue-deep);}
  .btn-ghost{background:#fff; color:var(--blue); border:1px solid var(--line);}
  .btn-ghost:hover{background:var(--blue-soft);}
  .btn-danger{background:transparent; color:var(--low); border:1px solid var(--low-bg); padding:4px 10px; font-size:11.5px;}
  .file-drop{
    border:1.5px dashed var(--line); border-radius:10px; padding:18px; text-align:center;
    background:#FAFAFB; color:var(--muted); font-size:13px; cursor:pointer;
  }
  .file-drop:hover{ border-color:var(--blue); color:var(--blue); }
  .file-drop input{ display:none; }
  .file-name{ font-size:12px; color:var(--blue-deep); margin-top:8px; font-weight:600; }

  .roster{ display:flex; flex-direction:column; gap:6px; margin-top:10px; }
  .roster-row{
    display:flex; align-items:center; justify-content:space-between;
    border:1px solid var(--line); background:#FAFAFB; border-radius:8px;
    padding:10px 14px; cursor:pointer; transition:.12s;
  }
  .roster-row:hover{ background:var(--blue-soft); }
  .roster-row.selected{ background:var(--blue-soft); border-color:var(--blue); }
  .roster-row .left{ display:flex; align-items:center; gap:10px; }
  .avatar{
    width:28px; height:28px; border-radius:50%; background:var(--blue);
    color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center;
    justify-content:center; flex-shrink:0;
  }
  .roster-row .name{ font-weight:600; font-size:13.5px; }
  .roster-row .chevron{ color:var(--muted); font-size:12px; }
  .roster-row .count-pill{
    font-size:11px; color:var(--muted); background:#fff; border:1px solid var(--line);
    padding:2px 8px; border-radius:999px;
  }
  .empty{ color:var(--muted); font-size:13px; padding:14px 0; text-align:center; }

  .ticket{
    position:relative; display:flex; border:1px solid var(--line); border-radius:8px;
    overflow:hidden; margin-bottom:10px; background:#FCFCFD;
  }
  .ticket .stub{ width:5px; flex-shrink:0; }
  .ticket .stub.perf-excellent{background:var(--good);}
  .ticket .stub.perf-good{background:var(--good2);}
  .ticket .stub.perf-mid{background:var(--mid);}
  .ticket .stub.perf-low{background:var(--low);}
  .ticket .body{ padding:11px 15px; flex:1; }
  .ticket .meta{
    display:flex; justify-content:space-between; align-items:center; font-size:11.5px;
    color:var(--muted); border-bottom:1px dashed var(--line); padding-bottom:7px;
    margin-bottom:7px; flex-wrap:wrap; gap:6px;
  }
  .ticket .meta .badge{ font-weight:700; font-size:11px; padding:2px 9px; border-radius:999px; }
  .badge.perf-excellent{background:var(--good-bg); color:var(--good);}
  .badge.perf-good{background:var(--good2-bg); color:var(--good2);}
  .badge.perf-mid{background:var(--mid-bg); color:var(--mid);}
  .badge.perf-low{background:var(--low-bg); color:var(--low);}
  .ticket .tags{ display:flex; flex-wrap:wrap; gap:5px; margin:7px 0; }
  .ticket .tag{
    font-size:11px; background:var(--mid-bg); color:#8A5B12; padding:2px 9px;
    border-radius:999px; font-weight:600;
  }
  .note-block{ font-size:13px; line-height:1.6; padding:9px 11px; border-radius:8px; margin-top:7px; }
  .note-block.quality{ background:var(--amber-panel); border:1px solid var(--amber-line); }
  .note-block.quality .tag-label{ color:#8A5B12; }
  .note-block.instructor{ background:var(--blue-soft); border:1px solid #C9D4F9; }
  .note-block.instructor .tag-label{ color:var(--blue-deep); }
  .note-block .tag-label{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; display:block; margin-bottom:3px; }
  .ticket .added-by{ font-size:11px; color:var(--muted); margin-top:8px; }
  .ticket .row-actions{ margin-top:8px; text-align:right; }

  .stars{ display:inline-flex; gap:3px; }
  .stars .star{ font-size:22px; color:var(--line); line-height:1; }
  .stars .star.filled{ color:var(--star); }
  .stars.input .star{ cursor:pointer; }
  .stars.small .star{ font-size:15px; }

  table.summary{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.summary th, table.summary td{ padding:9px 10px; border-bottom:1px solid var(--line); text-align:left; }
  table.summary th{ color:var(--muted); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.02em; }
  .status-pill{
    display:inline-block; background:var(--good-bg); color:var(--good); font-size:11px;
    font-weight:700; padding:2px 10px; border-radius:999px;
  }
  .pin-overlay{
    position:fixed; inset:0; background:rgba(31,41,55,.5); display:flex;
    align-items:center; justify-content:center; z-index:50;
  }
  .pin-box{ background:#fff; border-radius:12px; padding:26px; width:300px; }
  .pin-box h3{margin:0 0 4px; color:var(--ink); font-size:16px;}
  .pin-box .sub{color:var(--muted); font-size:12px; margin-bottom:16px;}
  .pin-err{color:var(--low); font-size:12px; min-height:16px; margin-bottom:4px;}
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink);
    color:#fff; padding:9px 18px; border-radius:999px; font-size:12.5px; z-index:60;
    opacity:0; transition:opacity .25s; pointer-events:none;
  }
  .toast.show{opacity:1;}
  .search-bar{display:flex; gap:8px;}
  .search-bar input{flex:1;}
  .instructor-card{
    display:flex; justify-content:space-between; align-items:center; background:var(--blue-soft);
    color:var(--blue-deep); padding:14px 18px; border-radius:10px; margin-bottom:16px; flex-wrap:wrap; gap:8px;
  }
  .instructor-card .name{font-weight:700; font-size:16px;}
  .instructor-card .idline{font-family:'SFMono-Regular',Consolas,monospace; font-size:11.5px; opacity:.8; display:flex; gap:10px; flex-wrap:wrap;}
  .loading{color:var(--muted); font-size:13px; text-align:center; padding:20px;}
  .admin-list{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .admin-chip{
    border:1px solid var(--line); background:#FAFAFB; padding:5px 12px; border-radius:999px;
    font-size:12px; display:flex; align-items:center; gap:6px;
  }
  .team-block{ border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:14px; background:#FCFCFD; }
  .team-block .team-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .team-block .team-head .tname{ font-weight:700; font-size:14px; color:var(--purple); }
  .team-block .team-head .tlead{ font-size:11.5px; color:var(--muted); }
  .share-links{ display:flex; gap:18px; flex-wrap:wrap; }
  .share-links .link-col{ flex:1; min-width:220px; display:flex; flex-direction:column; gap:8px; }
  .share-links .link-col label{ margin-bottom:0; }
  .share-links input[type=text]{ background:#fff; font-size:12.5px; color:var(--muted); cursor:text; }
  .share-links .copy-btn{ align-self:center; width:100%; max-width:170px; }
  @media (max-width:600px){ header.top{flex-direction:column; align-items:flex-start;} }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Loading data...</div>
</div>

<div class="toast" id="toast"></div>

<script>
const IMPROVEMENT_AREAS = ['Camera', 'Attitude', 'Preparation', 'Patient with student', 'Body language'];

const DEFAULT_ADMINS = [
  {name:'Alaa', pin:'1111', team:'Team 1'},
  {name:'Sara', pin:'2222', team:'Team 2'},
  {name:'Marwa', pin:'3333', team:'Team 3'},
  {name:'Yomna', pin:'4444', team:'Team 4'},
];
const LEAD_PIN = '5000'; // Team Lead overview access code

function getLockedModeFromURL(){
  try{
    const params = new URLSearchParams(window.location.search);
    const v = (params.get('view') || '').toLowerCase();
    if(v === 'admin' || v === 'lead' || v === 'instructor') return v;
  }catch(e){}
  return null;
}
const LOCKED_MODE = getLockedModeFromURL();

let state = {
  mode: LOCKED_MODE || 'instructor', // 'admin' | 'instructor' | 'lead'
  adminUnlocked: false,
  currentAdminName: null,
  leadUnlocked: false,
  data: null,
  selectedInstructorId: null,
  leadSelectedInstructorId: null,
  lookupResultId: null,
  lookupInput: '',
  loading: true,
  noteDraft: null,
  importFileName: null,
  rosterQueryDraft: '',
  rosterQueryApplied: '',
  rosterCollapsed: true,
  summaryCollapsed: true,
  leadTeamOpen: {},
  leadQueryDraft: '',
  leadQueryApplied: '',
};

const DATA_KEY = 'team_data';

function freshDraft(){
  return {
    date: new Date().toISOString().slice(0,10),
    session: '',
    overall: 0,
    improvements: [],
    qualityNote: '',
    instructorMessage: '',
  };
}

async function loadData(){
  try{
    const res = await window.storage.get(DATA_KEY, true);
    state.data = res ? JSON.parse(res.value) : { instructors: [], notes: {}, admins: DEFAULT_ADMINS.slice() };
  }catch(e){
    state.data = { instructors: [], notes: {}, admins: DEFAULT_ADMINS.slice() };
  }
  if(!state.data.admins || state.data.admins.length === 0){
    state.data.admins = DEFAULT_ADMINS.slice();
  }
  state.data.admins.forEach(a=>{
    if(!a.team){
      const known = DEFAULT_ADMINS.find(d=>d.name.toLowerCase() === a.name.toLowerCase());
      a.team = known ? known.team : a.name + "'s Team";
    }
  });
  if(!state.data.instructors) state.data.instructors = [];
  if(!state.data.notes) state.data.notes = {};
  state.loading = false;
  render();
  saveData();
}

async function saveData(){
  try{
    const res = await window.storage.set(DATA_KEY, JSON.stringify(state.data), true);
    if(!res){ showToast('Could not save — please try again'); }
  }catch(e){
    showToast('Could not save — please try again');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function perfTier(score){
  if(score >= 4.5) return 'excellent';
  if(score >= 3.5) return 'good';
  if(score >= 2.5) return 'mid';
  return 'low';
}
function perfLabel(tier){
  return {excellent:'Excellent', good:'Very good', mid:'Average', low:'Needs improvement'}[tier] || tier;
}
function initials(name){
  return (name||'').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
}
function renderStarsStatic(value, small){
  let out = `<span class="stars ${small?'small':''}">`;
  for(let i=1;i<=5;i++){
    out += `<span class="star ${i<=Math.round(value)?'filled':''}">★</span>`;
  }
  out += '</span>';
  return out;
}
function avgScore(list){
  const scores = (list||[]).map(n=>n.overall||0);
  return scores.length ? scores.reduce((a,b)=>a+b,0) / scores.length : 0;
}

function renderRatingTrend(instructorId){
  const list = (state.data.notes[instructorId] || []).slice().sort((a,b)=> a.date.localeCompare(b.date));
  if(list.length === 0) return '';

  let trendLabel = '→ Stable', trendColor = 'var(--muted)';
  if(list.length >= 2){
    const half = Math.ceil(list.length/2);
    const firstHalf = avgScore(list.slice(0, half));
    const secondHalf = avgScore(list.slice(half));
    if(secondHalf - firstHalf >= 0.3){ trendLabel = '↑ Improving'; trendColor = 'var(--good)'; }
    else if(firstHalf - secondHalf >= 0.3){ trendLabel = '↓ Declining'; trendColor = 'var(--low)'; }
  }

  const w = Math.max(300, Math.min(760, list.length * 68));
  const h = 168;
  const padL = 30, padR = 14, padT = 12, padB = 28;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;
  const stepX = list.length > 1 ? plotW / (list.length - 1) : 0;
  const yFor = v => padT + plotH - ((Math.max(0,Math.min(5,v))-1)/4) * plotH;

  const points = list.map((n, idx) => ({
    x: padL + (list.length > 1 ? idx * stepX : plotW/2),
    y: yFor(n.overall || 0),
    n
  }));

  const linePath = points.map((p, idx) => `${idx===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const baseY = (padT + plotH).toFixed(1);
  const areaPath = `${linePath} L${points[points.length-1].x.toFixed(1)},${baseY} L${points[0].x.toFixed(1)},${baseY} Z`;

  const gridLines = [1,2,3,4,5].map(v=>{
    const y = yFor(v);
    return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"/><text x="${padL-7}" y="${(y+3).toFixed(1)}" font-size="9.5" fill="var(--muted)" text-anchor="end">${v}</text>`;
  }).join('');

  const tierVar = { excellent:'--good', good:'--good2', mid:'--mid', low:'--low' };
  const labelEvery = Math.max(1, Math.ceil(list.length / 7));
  const dotsAndLabels = points.map((p, idx)=>{
    const tier = perfTier(p.n.overall || 0);
    const showLabel = idx === 0 || idx === points.length-1 || idx % labelEvery === 0;
    return `
      <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.2" fill="var(${tierVar[tier]})" stroke="#fff" stroke-width="1.5"><title>${escapeHtml(p.n.date)} · ${(p.n.overall||0)}/5</title></circle>
      ${showLabel ? `<text x="${p.x.toFixed(1)}" y="${h-9}" font-size="9" fill="var(--muted)" text-anchor="middle">${escapeHtml((p.n.date||'').slice(5))}</text>` : ''}
    `;
  }).join('');

  return `
  <div class="panel" style="padding:14px 18px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
      <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;">Performance over time · ${list.length} note${list.length>1?'s':''}</span>
      <span style="font-size:12.5px;font-weight:700;color:${trendColor}">${trendLabel}</span>
    </div>
    <div style="overflow-x:auto;">
      <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;">
        ${gridLines}
        <path d="${areaPath}" fill="var(--blue-soft)" opacity="0.7"/>
        <path d="${linePath}" fill="none" stroke="var(--blue)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
        ${dotsAndLabels}
      </svg>
    </div>
  </div>`;
}

function renderStarsInput(value){
  let out = `<span class="stars input" id="overallStars">`;
  for(let i=1;i<=5;i++){
    out += `<span class="star ${i<=value?'filled':''}" data-val="${i}">★</span>`;
  }
  out += '</span>';
  return out;
}

// ---------- rendering ----------
function render(){
  const app = document.getElementById('app');
  if(state.loading){
    app.innerHTML = '<div class="loading">Loading data...</div>';
    return;
  }
  app.innerHTML = `
    ${renderHeader()}
    ${state.mode === 'admin' ? renderAdmin() : state.mode === 'lead' ? renderLead() : renderInstructor()}
    ${(!state.adminUnlocked && state.mode==='admin') ? renderPinOverlay() : ''}
    ${(!state.leadUnlocked && state.mode==='lead') ? renderLeadPinOverlay() : ''}
  `;
  attachHeaderEvents();
  if(state.mode === 'admin' && state.adminUnlocked) attachAdminEvents();
  if(state.mode === 'instructor') attachInstructorEvents();
  if(state.mode === 'admin' && !state.adminUnlocked) attachPinEvents();
  if(state.mode === 'lead' && state.leadUnlocked) attachLeadEvents();
  if(state.mode === 'lead' && !state.leadUnlocked) attachLeadPinEvents();
}

function renderHeader(){
  return `
  <header class="top">

function attachHeaderEvents(){
  document.querySelectorAll('.mode-switch button').forEach(btn=>{
    btn.onclick = ()=>{ state.mode = btn.dataset.mode; render(); };
  });
  const signOut = document.getElementById('signOutBtn');
  if(signOut) signOut.onclick = ()=>{ state.adminUnlocked=false; state.currentAdminName=null; render(); };
  const leadSignOut = document.getElementById('leadSignOutBtn');
  if(leadSignOut) leadSignOut.onclick = ()=>{ state.leadUnlocked=false; render(); };
}

function renderPinOverlay(){
  const admins = state.data.admins;
  return `
  <div class="pin-overlay"><div class="pin-box">
    <h3>Admin sign-in</h3>
    <div class="sub">Choose your name and enter your PIN</div>
    <label>Admin</label>
    <select id="adminSelect">
      ${admins.map(a=>`<option value="${escapeHtml(a.name)}">${escapeHtml(a.name)} — ${escapeHtml(a.team||'')}</option>`).join('')}
    </select>
    <div style="height:10px"></div>
    <label>PIN</label>
    <input type="password" id="pinInput" placeholder="PIN" maxlength="8" />
    <div class="pin-err" id="pinErr"></div>
    <button class="btn btn-primary" id="pinSubmit" style="width:100%; margin-top:6px">Sign in</button>
  </div></div>`;
}

function attachPinEvents(){
  const submit = ()=>{
    const name = document.getElementById('adminSelect').value;
    const pin = document.getElementById('pinInput').value.trim();
    const match = state.data.admins.find(a=>a.name === name && a.pin === pin);
    if(match){ state.adminUnlocked = true; state.currentAdminName = match.name; render(); }
    else{ document.getElementById('pinErr').textContent = 'Wrong PIN, try again'; }
  };
  document.getElementById('pinSubmit').onclick = submit;
  document.getElementById('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  document.getElementById('pinInput').focus();
}

function renderLeadPinOverlay(){
  return `
  <div class="pin-overlay"><div class="pin-box">
    <h3>Team Lead sign-in</h3>
    <div class="sub">Enter the Team Lead access code</div>
    <label>Access code</label>
    <input type="password" id="leadPinInput" placeholder="Code" maxlength="8" />
    <div class="pin-err" id="leadPinErr"></div>
    <button class="btn btn-primary" id="leadPinSubmit" style="width:100%; margin-top:6px">Sign in</button>
  </div></div>`;
}

function attachLeadPinEvents(){
  const submit = ()=>{
    const pin = document.getElementById('leadPinInput').value.trim();
    if(pin === LEAD_PIN){ state.leadUnlocked = true; render(); }
    else{ document.getElementById('leadPinErr').textContent = 'Wrong code, try again'; }
  };
  document.getElementById('leadPinSubmit').onclick = submit;
  document.getElementById('leadPinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  document.getElementById('leadPinInput').focus();
}

// ---------- ADMIN MODE ----------
function baseAppUrl(){
  return window.location.origin + window.location.pathname;
}

function renderShareLinksPanel(){
  const base = baseAppUrl();
  const links = [
    { label: 'Instructor link (national ID lookup, no login)', id: 'linkInstructor', url: `${base}?view=instructor` },
    { label: 'Team leader link (read-only summary for this team — needs a team login)', id: 'linkAdmin', url: `${base}?view=admin` },
    { label: 'Overall leader link (read-only — sees every team, needs the leader login)', id: 'linkLead', url: `${base}?view=lead` },
  ];
  return `
  <div class="panel">
    <h2><span class="eyebrow purple">Links</span> Dedicated links to share</h2>
    <div class="share-links">
      ${links.map(l => `
      <div class="link-col">
        <label>${l.label}</label>
        <input type="text" id="${l.id}" value="${escapeHtml(l.url)}" readonly>
        <button class="btn btn-ghost copy-btn" data-copy="${l.id}">Copy</button>
      </div>`).join('')}
    </div>
  </div>`;
}

function attachShareLinksEvents(){
  document.querySelectorAll('[data-copy]').forEach(btn=>{
    btn.onclick = async ()=>{
      const input = document.getElementById(btn.dataset.copy);
      if(!input) return;
      try{
        await navigator.clipboard.writeText(input.value);
      }catch(e){
        input.select();
        try{ document.execCommand('copy'); }catch(e2){}
      }
      showToast('Link copied');
    };
  });
}

function renderAdmin(){
  if(!state.adminUnlocked) return '<div style="min-height:200px"></div>';
  const myTeam = (state.data.admins.find(a=>a.name === state.currentAdminName)||{}).team || '';
  const instructors = state.data.instructors.filter(i => i.team === myTeam);
  const selected = instructors.find(i=>i.id === state.selectedInstructorId) || null;

  return `
  ${state.currentAdminName === 'Alaa' ? renderShareLinksPanel() : ''}
  <div class="panel">
    <h2><span class="eyebrow">Team</span> Manage admins</h2>
    <div class="admin-list">
      ${state.data.admins.map(a => `<span class="admin-chip">👤 ${escapeHtml(a.name)} · ${escapeHtml(a.team||'')}</span>`).join('')}
    </div>
    <div class="row">
      <div><label>New admin name</label><input type="text" id="newAdminName"></div>
      <div><label>Team name</label><input type="text" id="newAdminTeam" placeholder="e.g. Team 5"></div>
      <div><label>PIN</label><input type="text" id="newAdminPin"></div>
      <div style="flex:0 0 auto; align-self:flex-end"><button class="btn btn-ghost" id="addAdminBtn">Add admin</button></div>
    </div>
  </div>

  <div class="panel">
    <h2><span class="eyebrow">Import</span> Add instructors from a CSV file · ${escapeHtml(myTeam)}</h2>
    <label>If your file has column headers (Tutor ID, Name, Phone, Email, National ID) we use them directly — any extra columns like Grade or Mentor are ignored. Without headers, we auto-detect columns as before.</label>
    <div class="file-drop" id="fileDrop">
      📄 Click to choose a CSV file
      <input type="file" id="csvFile" accept=".csv,text/csv">
      ${state.importFileName ? `<div class="file-name">${escapeHtml(state.importFileName)}</div>` : ''}

function computeImprovementCounts(instructors){
  const counts = {};
  IMPROVEMENT_AREAS.forEach(a=> counts[a] = 0);
  instructors.forEach(i=>{
    (state.data.notes[i.id] || []).forEach(n=>{
      (n.improvements || []).forEach(a=>{
        counts[a] = (counts[a] || 0) + 1;
      });
    });
  });
  return counts;
}

function renderImprovementChart(instructors){
  const counts = computeImprovementCounts(instructors);
  const entries = Object.entries(counts).sort((a,b)=> b[1]-a[1]);
  const total = entries.reduce((s,e)=> s+e[1], 0);
  if(total === 0){
    return '<div class="empty" style="padding:6px 0;">No "needs to improve" tags recorded yet for this team</div>';
  }
  const max = Math.max(1, ...entries.map(e=>e[1]));
  return `
  <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:2px;">
    ${entries.map(([area,count])=>{
      const pct = Math.round((count/max)*100);
      return `
      <div>
        <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:3px;">
          <span style="font-weight:600; color:var(--ink);">${escapeHtml(area)}</span>
          <span style="color:var(--muted);">${count}</span>
        </div>
        <div style="background:var(--line); border-radius:6px; height:9px; overflow:hidden;">
          <div style="background:var(--blue); width:${pct}%; height:100%; border-radius:6px;"></div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderRosterRows(instructors){
  if(instructors.length === 0){
    return '<div class="empty">No instructors yet in this team — import a CSV file above</div>';
  }
  const qRaw = (state.rosterQueryApplied||'').trim();
  const q = qRaw.toLowerCase();
  const qDigits = qRaw.replace(/[^\d]/g, '');
  const matches = q ? instructors.filter(i =>
    i.name.toLowerCase().includes(q) ||
    i.id.toLowerCase().includes(q) ||
    (qDigits && (i.nid||'').includes(qDigits))
  ) : instructors;

  if(q && matches.length === 0){
    return `<div class="empty">No matches for "${escapeHtml(state.rosterQueryApplied)}" in this team</div>`;
  }

  return matches.map(i => {
    const count = (state.data.notes[i.id]||[]).length;
    return `
    <div class="roster-row ${i.id===state.selectedInstructorId?'selected':''}" data-id="${i.id}">
      <div class="left">
        <span class="avatar">${initials(i.name)}</span>

        <span class="count-pill">${count} notes</span>
        <span class="chevron">${i.id===state.selectedInstructorId?'▲':'▼'}</span>
      </div>
    </div>`;
  }).join('');
}

function detectDelimiter(firstLine){
  const candidates = [',', ';', '\t'];
  let best = ',', bestCount = -1;
  candidates.forEach(d=>{
    const count = firstLine.split(d).length;
    if(count > bestCount){ bestCount = count; best = d; }
  });
  return best;
}

function detectHeaderMap(headerParts){
  const norm = headerParts.map(h => (h||'').toLowerCase().replace(/[^a-z]/g, ''));
  let idIdx=-1, nameIdx=-1, nidIdx=-1, phoneIdx=-1, emailIdx=-1;
  norm.forEach((h, idx)=>{
    if(nidIdx<0 && (h.includes('nationalid') || h.includes('nid') || h.includes('nationalno'))){ nidIdx = idx; return; }
    if(idIdx<0 && h.includes('id')){ idIdx = idx; return; }
    if(nameIdx<0 && h.includes('name') && !h.includes('mentor') && !h.includes('team')){ nameIdx = idx; return; }
    if(phoneIdx<0 && (h.includes('phone') || h.includes('mobile'))){ phoneIdx = idx; return; }
    if(emailIdx<0 && (h.includes('email') || h.includes('mail'))){ emailIdx = idx; return; }
  });
  if(idIdx >= 0 && nameIdx >= 0){
    return { idIdx, nameIdx, nidIdx, phoneIdx, emailIdx };
  }
  return null;
}

function extractRowByMap(parts, map){
  const get = idx => (idx >= 0 && idx < parts.length) ? parts[idx].trim().replace(/^"|"$/g,'') : '';
  return {
    tutorId: get(map.idIdx),
    name: get(map.nameIdx),
    nid: get(map.nidIdx).replace(/[^\d]/g, ''),
    phone: get(map.phoneIdx).replace(/[^\d]/g, ''),
    email: get(map.emailIdx),
  };
}

function classifyRow(parts){
  let tutorId = '', nid = '', phone = '', email = '', name = '';
  const used = new Array(parts.length).fill(false);

  parts.forEach((p, idx)=>{
    if(/@/.test(p)){ email = p; used[idx] = true; }
  });
  parts.forEach((p, idx)=>{
    if(used[idx]) return;
    if(/^t[\s\-_]?\d+$/i.test(p.replace(/\s+/g,''))){ tutorId = p.trim(); used[idx] = true; }
  });
  // remaining numeric-heavy fields: longest digit run = NID (14 digits), medium = phone
  let bestDigits = '', bestIdx = -1;
  parts.forEach((p, idx)=>{
    if(used[idx]) return;
    const digits = p.replace(/[^\d]/g, '');
    if(digits.length >= 12 && digits.length > bestDigits.length){ bestDigits = digits; bestIdx = idx; }
  });
  if(bestIdx >= 0){ nid = bestDigits; used[bestIdx] = true; }

  parts.forEach((p, idx)=>{
    if(used[idx]) return;
    const digits = p.replace(/[^\d]/g, '');
    if(digits.length >= 7 && digits.length <= 11 && !phone){ phone = digits; used[idx] = true; }
  });

  // name = first remaining field containing letters
  parts.forEach((p, idx)=>{
    if(used[idx] || name) return;
    if(/[A-Za-zء-ي]/.test(p)){ name = p.trim(); used[idx] = true; }
  });

  return { tutorId, name, nid, phone, email };
}

function handleCsvFile(e){
  const file = e.target.files[0];
  if(!file) return;
  state.importFileName = file.name;
  const myTeam = (state.data.admins.find(a=>a.name === state.currentAdminName)||{}).team || '';
  const reader = new FileReader();
  reader.onload = (ev)=>{
    let text = ev.target.result || '';
    text = text.replace(/^\uFEFF/, '');
    const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    if(lines.length === 0){ showToast('This file looks empty'); return; }
    const delimiter = detectDelimiter(lines[0]);
    const headerParts = lines[0].split(delimiter).map(p=>p.trim().replace(/^"|"$/g,''));
    const map = detectHeaderMap(headerParts);
    const dataLines = map ? lines.slice(1) : lines;
    let added = 0, skipped = 0;
    dataLines.forEach(line=>{
      const parts = line.split(delimiter).map(p=>p.trim().replace(/^"|"$/g,''));
      if(parts.length < 2){ skipped++; return; }
      const row = map ? extractRowByMap(parts, map) : classifyRow(parts);
      if(!row.tutorId || !row.name){ skipped++; return; } // catches header rows and blank names too
      const exists = state.data.instructors.find(i=>i.id === row.tutorId);
      if(!exists){
        state.data.instructors.push({
          id: row.tutorId, name: row.name, nid: row.nid, phone: row.phone, email: row.email, team: myTeam
        });
        if(!state.data.notes[row.tutorId]) state.data.notes[row.tutorId] = [];
        added++;
      }
    });
    saveData(); render();
    if(added > 0){
      showToast(`Imported ${added} instructor(s) into ${myTeam}${skipped ? ` (${skipped} row(s) skipped)` : ''}`);
    }else{
      showToast('No new instructors found — make sure the file has a Tutor ID (T-xxxxx) and a Name column');
    }
  };
  reader.readAsText(file);
}

function handleAddNote(){

function handleExport(){
  const myTeam = (state.data.admins.find(a=>a.name === state.currentAdminName)||{}).team || '';
  const instructors = state.data.instructors.filter(i => i.team === myTeam);
  const header = ['Tutor ID','Name','National ID','Phone','Email','Team','Date','Session','Overall (1-5)','Needs to improve','Note for Quality','Message to Instructor','Added by'];
  let csv = '\uFEFF' + header.join(',') + '\n';
  instructors.forEach(i=>{
    const list = state.data.notes[i.id] || [];
    if(list.length === 0){
      csv += [i.id, i.name, i.nid||'', i.phone||'', i.email||'', i.team||'', '', '', '', '', '', '', ''].map(csvEscape).join(',') + '\n';
    }
    list.forEach(n=>{
      csv += [i.id, i.name, i.nid||'', i.phone||'', i.email||'', i.team||'', n.date, n.session||'', n.overall||'', (n.improvements||[]).join('; '), n.qualityNote||'', n.instructorMessage||'', n.addedBy||''].map(csvEscape).join(',') + '\n';
    });
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${myTeam.replace(/\s+/g,'-')}-performance-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function csvEscape(v){
  const s = String(v ?? '');
  if(s.includes(',') || s.includes('"') || s.includes('\n')){ return '"' + s.replace(/"/g,'""') + '"'; }
  return s;
}

    <div class="row">
      ${admins.map(a=>{
        const teamInstructors = instructors.filter(i=>i.team === a.team);
        const totalNotes = teamInstructors.reduce((s,i)=> s + (notes[i.id]||[]).length, 0);
        return `<div style="flex:1;min-width:150px;border:1px solid var(--line);border-radius:10px;padding:12px 14px;">
          <div style="font-size:12px;color:var(--muted)">${escapeHtml(a.team||'')}</div>
          <div style="font-weight:700;font-size:15px;color:var(--ink)">${escapeHtml(a.name)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">${teamInstructors.length} instructors · ${totalNotes} notes</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="panel">
    <h2><span class="eyebrow purple">Search</span> Find an instructor across all teams</h2>
    <div class="search-bar">
      <input type="text" id="leadSearchInput" placeholder="Search by Tutor ID, name, or National ID..." value="${escapeHtml(state.leadQueryDraft||'')}">
      <button class="btn btn-primary" id="leadSearchBtn" style="flex:0 0 auto">Search</button>
      ${state.leadQueryApplied ? `<button class="btn btn-ghost" id="leadSearchClearBtn" style="flex:0 0 auto">Clear</button>` : ''}
    </div>
    ${state.leadQueryApplied ? renderLeadSearchResults() : ''}
  </div>

  ${admins.map(a => renderLeadTeamBlock(a)).join('')}
  `;
}

function renderLeadSearchResults(){
  const qRaw = (state.leadQueryApplied||'').trim();
  const q = qRaw.toLowerCase();
  const qDigits = qRaw.replace(/[^\d]/g, '');
  const matches = state.data.instructors.filter(i =>
    i.name.toLowerCase().includes(q) ||
    i.id.toLowerCase().includes(q) ||
    (qDigits && (i.nid||'').includes(qDigits))
  );
  if(matches.length === 0){
    return `<div class="empty">No matches for "${escapeHtml(qRaw)}" in any team</div>`;
  }
  return `
  <div class="roster" style="margin-top:12px;">
    ${matches.map(i=>{
      const list = state.data.notes[i.id] || [];
      const avg = avgScore(list);
      const isSel = state.leadSelectedInstructorId === i.id;
      return `
      <div class="roster-row ${isSel?'selected':''}" data-lead-search-id="${escapeHtml(i.id)}" data-lead-search-team="${escapeHtml(i.team||'')}">
        <div class="left">
          <span class="avatar">${initials(i.name)}</span>
          <div>
            <div class="name">${escapeHtml(i.name)}</div>
            <div style="font-size:11px;color:var(--muted);">${escapeHtml(i.team||'—')} · ID: ${escapeHtml(i.id)}</div>
          </div>
        </div>
        <div class="left">
          ${list.length ? renderStarsStatic(avg, true) : '<span class="count-pill">No notes</span>'}
          <span class="chevron">${isSel?'▲':'▼'}</span>
        </div>
      </div>
      ${isSel ? renderLeadInstructorDetail(i) : ''}
      `;
    }).join('')}
  </div>`;
}

function renderLeadTeamBlock(admin){
  const teamInstructors = state.data.instructors.filter(i => i.team === admin.team);
  const isOpen = !!state.leadTeamOpen[admin.team];
  const totalNotes = teamInstructors.reduce((s,i)=> s + (state.data.notes[i.id]||[]).length, 0);
  return `
  <div class="panel">
    <div class="team-block">
      <div class="team-head" data-lead-team-toggle="${escapeHtml(admin.team||'')}" style="cursor:pointer; user-select:none">
        <span class="tname">${escapeHtml(admin.team||'')} <span style="color:var(--muted); font-weight:600; font-size:12px">(${teamInstructors.length} instructors · ${totalNotes} notes)</span></span>
        <span class="tlead">Led by ${escapeHtml(admin.name)} &nbsp; ${isOpen ? '▲ Hide' : '▼ Show'}</span>
      </div>
      ${isOpen ? `
      <div style="margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;margin-bottom:8px;">Most common areas to improve</div>
        ${renderImprovementChart(teamInstructors)}
      </div>
      <div class="roster">
        ${teamInstructors.length === 0 ? '<div class="empty">No instructors imported into this team yet</div>' :
          teamInstructors.map(i => {
            const count = (state.data.notes[i.id]||[]).length;
            const isSel = state.leadSelectedInstructorId === i.id;
            return `
            <div class="roster-row ${isSel?'selected':''}" data-lead-id="${i.id}">
              <div class="left"><span class="avatar">${initials(i.name)}</span><span class="name">${escapeHtml(i.name)}</span></div>
              <div class="left"><span class="count-pill">${count} notes</span><span class="chevron">${isSel?'▲':'▼'}</span></div>
            </div>
            ${isSel ? renderLeadInstructorDetail(i) : ''}
            `;
          }).join('')}
      </div>
      ` : ''}
    </div>
  </div>`;
}

function renderLeadInstructorDetail(i){
  const list = (state.data.notes[i.id] || []).slice().sort((a,b)=> b.date.localeCompare(a.date));
  return `
  <div style="padding:10px 4px 4px">
    <div class="instructor-card">
      <div>
        <div class="name">${escapeHtml(i.name)}</div>
        <div class="idline"><span>ID: ${escapeHtml(i.id)}</span><span>NID: ${escapeHtml(i.nid||'—')}</span></div>
      </div>
      <div><span class="status-pill">${list.length} notes</span></div>
    </div>
    ${renderRatingTrend(i.id)}
    ${list.length === 0 ? '<div class="empty">No notes yet</div>' :
      list.map(n => renderTicket(n, null, null, 'lead')).join('')}
  </div>`;
}

function attachLeadEvents(){
  const refreshBtn = document.getElementById('leadRefreshBtn');
  if(refreshBtn) refreshBtn.onclick = async ()=>{ state.loading = true; render(); await loadData(); showToast('Refreshed'); };
  document.querySelectorAll('[data-lead-team-toggle]').forEach(head=>{
    head.onclick = ()=>{
      const team = head.dataset.leadTeamToggle;
      state.leadTeamOpen[team] = !state.leadTeamOpen[team];
      render();
    };
  });
  document.querySelectorAll('[data-lead-id]').forEach(row=>{
    row.onclick = ()=>{
      const id = row.dataset.leadId;
      state.leadSelectedInstructorId = state.leadSelectedInstructorId === id ? null : id;
      render();
    };
  });

  const leadSearchInput = document.getElementById('leadSearchInput');
  const doLeadSearch = ()=>{
    state.leadQueryDraft = leadSearchInput.value;
    state.leadQueryApplied = leadSearchInput.value.trim();
    render();
  };
  if(leadSearchInput){
    leadSearchInput.oninput = ()=>{ state.leadQueryDraft = leadSearchInput.value; };
    leadSearchInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doLeadSearch(); });
  }
  const leadSearchBtn = document.getElementById('leadSearchBtn');
  if(leadSearchBtn) leadSearchBtn.onclick = doLeadSearch;
  const leadSearchClearBtn = document.getElementById('leadSearchClearBtn');
  if(leadSearchClearBtn) leadSearchClearBtn.onclick = ()=>{ state.leadQueryDraft=''; state.leadQueryApplied=''; render(); };

  document.querySelectorAll('[data-lead-search-id]').forEach(row=>{
    row.onclick = ()=>{
      const id = row.dataset.leadSearchId;
      const team = row.dataset.leadSearchTeam;
      state.leadSelectedInstructorId = state.leadSelectedInstructorId === id ? null : id;
      if(state.leadSelectedInstructorId){ state.leadTeamOpen[team] = true; }
      render();
    };
  });
}

// ---------- INSTRUCTOR MODE ----------
function renderInstructor(){
  const found = state.lookupResultId && state.lookupResultId !== 'notfound' ? state.data.instructors.find(i=>i.nid === state.lookupResultId) : null;
  return `
  <div class="panel">
    <h2>Instructor sign-in</h2>
    <label>Enter your National ID</label>
    <div class="search-bar">
      <input type="text" id="lookupInput" placeholder="National ID" value="${escapeHtml(state.lookupInput)}">
      <button class="btn btn-primary" id="lookupBtn" style="flex:0 0 auto">Search</button>
    </div>
  </div>
  ${state.lookupResultId === 'notfound' ? `
    <div class="panel"><div class="empty">No instructor found with this National ID. Double-check it or contact your team lead</div></div>
  ` : ''}
  ${found ? renderInstructorNotes(found) : ''}
  `;
}

function renderInstructorNotes(found){
  const list = (state.data.notes[found.id] || []).slice().sort((a,b)=> b.date.localeCompare(a.date));
  return `
  <div class="panel">
    <div class="instructor-card">
      <div>
        <div class="name">${escapeHtml(found.name)}</div>
        <div class="idline"><span>NID: ${escapeHtml(found.nid||'—')}</span></div>
      </div>
      <div><span class="status-pill">${list.length} notes</span></div>
    </div>
    ${renderRatingTrend(found.id)}
    <h2>Weekly notes and updates</h2>
    ${list.length === 0 ? '<div class="empty">No notes recorded for you yet</div>' :
      list.map(n => renderTicket(n, null, null, 'instructor')).join('')}
  </div>`;
}

function attachInstructorEvents(){
  const btn = document.getElementById('lookupBtn');
  const input = document.getElementById('lookupInput');
  const doLookup = ()=>{
    const val = input.value.trim().replace(/[^\d]/g,'');
    state.lookupInput = input.value.trim();
    if(!val){ state.lookupResultId = null; render(); return; }
    const found = state.data.instructors.find(i=>i.nid === val);
    state.lookupResultId = found ? found.nid : 'notfound';
    render();
  };
  if(btn) btn.onclick = doLookup;
  if(input) input.addEventListener('keydown', e=>{ if(e.key==='Enter') doLookup(); });
}

loadData();
</script>
</body>
</html>
